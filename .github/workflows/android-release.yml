name: Android Release (Play Store AAB)

# Builds a signed release Android App Bundle and uploads it to Google Play
# Internal Testing track. Runs on tag push (e.g. `android-v1.0.2`) or manual
# dispatch so a routine `git push origin main` never triggers a Play upload.
#
# Required GitHub repository secrets:
#   ANDROID_KEYSTORE_BASE64     — base64 of android/elecmate-release.keystore
#   ANDROID_KEYSTORE_PASSWORD   — storepass AND keypass (same value)
#   ANDROID_KEY_ALIAS           — "elecmate"
#   GOOGLE_SERVICES_JSON_BASE64 — base64 of android/app/google-services.json
#   PLAY_SERVICE_ACCOUNT_JSON   — Google Play Developer API service account JSON
#                                 (only needed for the upload step)

on:
  push:
    tags:
      - 'android-v*'
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

concurrency:
  group: android-release
  cancel-in-progress: false

jobs:
  build:
    name: Build + sign AAB
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install npm deps
        run: npm ci

      - name: Build web bundle
        run: npm run build
        env:
          VITE_REVENUECAT_IOS_KEY: ${{ secrets.VITE_REVENUECAT_IOS_KEY }}
          VITE_REVENUECAT_ANDROID_KEY: ${{ secrets.VITE_REVENUECAT_ANDROID_KEY }}

      - name: Capacitor sync
        run: npx cap sync android

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/elecmate-release.keystore

      - name: Decode google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json

      - name: Set gradle properties
        run: |
          cat > android/local.properties <<EOF
          KEYSTORE_PATH=../elecmate-release.keystore
          KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          EOF

      - name: Build signed release AAB
        working-directory: android
        env:
          # versionCode derived from GitHub Actions run number — strictly
          # increasing across every CI build so Play Store never rejects for
          # duplicate versionCode. Baseline 100 so we don't collide with the
          # manually-uploaded 1-23 from the early builds.
          ANDROID_VERSION_CODE: ${{ github.run_number }}00
          ANDROID_VERSION_NAME: ${{ github.ref_name }}
        run: ./gradlew bundleRelease --stacktrace

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: elecmate-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload mapping.txt
        uses: actions/upload-artifact@v7
        with:
          name: elecmate-release-mapping
          path: android/app/build/outputs/mapping/release/mapping.txt
          retention-days: 30
          if-no-files-found: warn

  deploy:
    name: Upload to Play Console
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/android-v')
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: elecmate-release-aab
          path: dist

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.elecmate.app
          releaseFiles: dist/app-release.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed
          changesNotSentForReview: false
