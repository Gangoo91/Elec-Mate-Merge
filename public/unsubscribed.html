<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <meta name="robots" content="noindex,nofollow" />
    <title>You're unsubscribed · Elec-Mate</title>
    <style>
      :root { color-scheme: dark light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #000;
        color: #e4e4e7;
        line-height: 1.5;
      }
      .card {
        width: 100%;
        max-width: 440px;
        background: #0a0a0a;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 20px;
        padding: 36px 32px;
        text-align: center;
      }
      .logo {
        width: 72px;
        height: 72px;
        border-radius: 16px;
        display: inline-block;
        margin-bottom: 24px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 22px;
        font-weight: 700;
        color: #4ade80;
        letter-spacing: -0.3px;
      }
      p {
        margin: 0 0 8px;
        font-size: 14px;
        color: #a1a1aa;
        line-height: 1.6;
      }
      .email {
        color: #fbbf24;
        font-weight: 600;
        word-break: break-all;
      }
      .mute {
        font-size: 12px;
        color: #52525b;
        margin-top: 20px;
      }
      a {
        color: #fbbf24;
        text-decoration: none;
      }
      @media (prefers-color-scheme: light) {
        body { background: #fafafa; color: #18181b; }
        .card { background: #fff; border-color: #e4e4e7; }
        h1 { color: #16a34a; }
        p { color: #52525b; }
        .email { color: #b45309; }
        .mute { color: #a1a1aa; }
        a { color: #b45309; }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <img class="logo" src="/pwa-512x512.png" alt="Elec-Mate" width="72" height="72" />
      <h1>You're unsubscribed</h1>
      <p id="msg">We won't send any more marketing emails to <span id="email" class="email">this address</span>.</p>
      <p>Important account emails (receipts, security) are unaffected.</p>
      <p class="mute">If that was a mistake, reply to <a href="mailto:info@elec-mate.com">info@elec-mate.com</a> and we'll re-subscribe you.</p>
      <p class="mute">Elec-Mate Ltd &middot; Built in the UK</p>
    </main>
    <script>
      try {
        var p = new URLSearchParams(location.search);
        var e = p.get('email');
        if (e) document.getElementById('email').textContent = e;
      } catch (_) {}
    </script>
  </body>
</html>
