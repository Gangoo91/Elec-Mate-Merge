<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Common pivot point -->
  <circle cx="20" cy="24" r="2" fill="currentColor" stroke="none"/>
  <!-- Two switch blade positions -->
  <circle cx="10" cy="12" r="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="30" cy="12" r="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <line x1="20" y1="24" x2="11" y2="14" stroke="currentColor" stroke-width="1.5"/>
  <!-- Connection lines -->
  <line x1="10" y1="8" x2="10" y2="10" stroke="currentColor" stroke-width="1.5"/>
  <line x1="30" y1="8" x2="30" y2="10" stroke="currentColor" stroke-width="1.5"/>
  <line x1="20" y1="26" x2="20" y2="32" stroke="currentColor" stroke-width="1.5"/>
  <!-- G label -->
  <text x="33" y="24" text-anchor="middle" dominant-baseline="central" fill="currentColor" font-family="Arial, sans-serif" font-size="8" font-weight="bold">G</text>
</svg>
