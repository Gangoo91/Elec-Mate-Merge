<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.5">
  <!-- Incoming line -->
  <line x1="20" y1="4" x2="20" y2="12"/>
  <!-- Break gap top contact -->
  <line x1="16" y1="12" x2="24" y2="12"/>
  <!-- Switch blade (open position) -->
  <line x1="20" y1="12" x2="28" y2="24"/>
  <!-- Break gap bottom contact -->
  <line x1="16" y1="28" x2="24" y2="28"/>
  <!-- Outgoing line -->
  <line x1="20" y1="28" x2="20" y2="36"/>
</svg>
