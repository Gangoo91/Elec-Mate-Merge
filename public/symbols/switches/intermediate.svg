<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.5">
  <!-- Plate -->
  <line x1="13" y1="26" x2="27" y2="26"/>
  <!-- Left blade from plate up-left -->
  <line x1="17" y1="26" x2="12" y2="14"/>
  <!-- Right blade from plate up-right -->
  <line x1="23" y1="26" x2="28" y2="14"/>
  <!-- Cross connection (dashed) showing intermediate switching -->
  <line x1="12" y1="14" x2="28" y2="14" stroke-dasharray="2 2"/>
  <!-- Dots at tips -->
  <circle cx="12" cy="14" r="2" fill="currentColor" stroke="none"/>
  <circle cx="28" cy="14" r="2" fill="currentColor" stroke="none"/>
</svg>
